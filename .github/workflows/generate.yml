name: Generate Tamil Ghibli Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Override topic (leave blank for auto-pick)"
        required: false
        default: ""
  schedule:
    - cron: "0 4 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Debug - check imports
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Working dir ==="
          pwd && ls -la
          echo "=== src/ contents ==="
          ls -la src/
          echo "=== Test imports ==="
          cd ${{ github.workspace }}
          python -c "
import sys
sys.path.insert(0, 'src')
print('sys.path:', sys.path[:3])
import llm_client
print('llm_client OK')
import topic_finder
print('topic_finder OK')
import script_generator
print('script_generator OK')
import image_generator
print('image_generator OK')
import video_builder
print('video_builder OK')
print('ALL IMPORTS OK')
"

      - name: Generate video
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          cd ${{ github.workspace }}
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            python src/main.py --topic "$TOPIC"
          else
            python src/main.py
          fi

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghibli-video-${{ github.run_number }}
          path: output/**/final.mp4
          retention-days: 7

      - name: Commit used_topics.json update
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/used_topics.json
          git diff --cached --quiet || git commit -m "chore: update used topics [skip ci]"
          git push
